<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>画像→SVG変換ツール</title>

<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.min.js"></script>

<style>
body{
  font-family:sans-serif;
  padding:20px;
}

img{
  max-width:300px;
  display:block;
  margin-top:15px;
}

#svgPreview{
  margin-top:20px;
  border:1px solid #ccc;
  padding:10px;
  min-height:100px;
}

textarea{
  width:100%;
  height:300px;
  margin-top:20px;
  font-family:monospace;
  resize:vertical;
}

button{
  margin-top:10px;
  margin-right:10px;
}
</style>
</head>
<body>

<h1>画像→SVG変換</h1>

<input type="file" id="file" accept="image/*">

<br>
<img id="preview">

<div id="svgPreview"></div>

<textarea
  id="svgCode"
  placeholder="ここにSVGコードが表示されます"
></textarea>

<br>

<button id="copy" disabled>
SVGコードをコピー
</button>

<button id="download" disabled>
SVGダウンロード
</button>

<script>
const fileInput = document.getElementById("file");
const preview = document.getElementById("preview");
const svgPreview = document.getElementById("svgPreview");
const svgCode = document.getElementById("svgCode");
const copyBtn = document.getElementById("copy");
const downloadBtn = document.getElementById("download");

let svgString = "";

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = e => {
    const src = e.target.result;
    preview.src = src;

    const img = new Image();

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = img.width;
      canvas.height = img.height;

      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
      );

      svgString = ImageTracer.imagedataToSVG(
        imageData,
        "posterized2"
      );

      svgPreview.innerHTML = svgString;
      svgCode.value = svgString;

      copyBtn.disabled = false;
      downloadBtn.disabled = false;
    };

    img.src = src;
  };

  reader.readAsDataURL(file);
});

copyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(svgString);
    copyBtn.textContent = "コピー完了！";

    setTimeout(() => {
      copyBtn.textContent = "SVGコードをコピー";
    }, 1500);

  } catch {
    alert("コピーできませんでした");
  }
});

downloadBtn.addEventListener("click", () => {
  const blob = new Blob(
    [svgString],
    { type: "image/svg+xml" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "image.svg";
  a.click();

  URL.revokeObjectURL(a.href);
});
</script>

</body>
</html>
